  <circle cx="270" cy="170" r="420" fill="url(#glow)"/>
  
  <rect x="120" y="120" width="1360" height="750" rx="70" fill="#0B1220" filter="url(#shadow)"/>
  <path d="M260 240h1080" stroke="#F8FAFC" stroke-width="20" stroke-linecap="round" opacity=".85"/>
  <g fill="#111827" stroke="#94A3B8" stroke-width="10">
    <rect x="350" y="260" width="170" height="120" rx="28"/>
    <rect x="715" y="260" width="170" height="120" rx="28"/>
    <rect x="1080" y="260" width="170" height="120" rx="28"/>
