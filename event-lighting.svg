<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Éclairage événementiel</title>
  <desc id="desc">Illustration libre de droit créée pour Pulse & Process. Projecteurs et effets lumineux.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#0B1220" stop-opacity="0.92"/>
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="20%" r="70%">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.38"/>
      <stop offset="0.55" stop-color="#7C3AED" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#0B1220" stop-opacity="0"/>
