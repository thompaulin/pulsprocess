  <path d="M435 380L250 785" stroke="#1FB6FF" stroke-width="76" stroke-linecap="round" opacity=".44"/>
  <path d="M800 380L800 810" stroke="#7C3AED" stroke-width="100" stroke-linecap="round" opacity=".36"/>
  <path d="M1165 380l190 405" stroke="#1FB6FF" stroke-width="76" stroke-linecap="round" opacity=".44"/>
