<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Gravure et support personnalisé</title>
  <desc id="desc">Illustration libre de droit créée pour Pulse & Process. Personnalisation graphique et support décoratif.</desc>
  <defs>
